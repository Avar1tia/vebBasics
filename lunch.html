<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Собрать ланч — Food Construct</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="lunch.css">
</head>
<body>
  <header class="header">
    <h1>Food Construct</h1>

    <nav class="nav">
      <a href="index.html#about">О нас</a>
      <a id="active" href="lunch.html">Собрать ланч</a>
      <a href="#order">Заказы</a>
      <a href="#contacts">Контакты</a>
    </nav>
  </header>

  <main class="main">
    <section class="menu-section" id="soups-section">
      <h2>Выберите суп</h2>
      <div class="dish-grid" id="soup-grid"></div>
    </section>

    <section class="menu-section" id="main-dishes-section">
      <h2>Выберите главное блюдо</h2>
      <div class="dish-grid" id="main-dish-grid"></div>
    </section>

    <section class="menu-section" id="drinks-section">
      <h2>Выберите напиток</h2>
      <div class="dish-grid" id="drink-grid"></div>
    </section>
  </main>


  <section id="order" class="order-section">
    <h2>Сделать заказ</h2>

    <form class="order-form" action="https://httpbin.org/post" method="post">
      <div class="order-column">
        <h3>Ваш заказ</h3>

        <div class="order-summary" id="order-summary">
          <p class="empty-order">Ничего не выбрано</p>
        </div>

        <input type="hidden" id="selected-soup" name="selected_soup" value="">
        <input type="hidden" id="selected-main-dish" name="selected_main_dish" value="">
        <input type="hidden" id="selected-drink" name="selected_drink" value="">
        <input type="hidden" id="order-total" name="order_total" value="">

        <label for="comment">Комментарий к заказу</label>
        <textarea id="comment" name="comment" rows="6"></textarea>
      </div>

      <div class="order-column">
        <h3>Ваши данные</h3>

        <label for="client-name">Имя</label>
        <input id="client-name" type="text" name="client_name" required>

        <label for="email">Email</label>
        <input id="email" type="email" name="email" required>

        <div class="checkbox-row">
          <input id="newsletter" type="checkbox" name="newsletter" value="yes" checked>
          <label for="newsletter">Получать информацию о скидках и акциях</label>
        </div>

        <label for="phone">Номер телефона</label>
        <input id="phone" type="tel" name="phone" required>

        <label for="address">Адрес доставки</label>
        <input id="address" type="text" name="address" required>
        <p class="form-hint">Доставка осуществляется только по Москве</p>

        <p class="radio-title">Время доставки:</p>
        <div class="radio-row">
          <input id="delivery-soon" type="radio" name="delivery_time_type" value="asap" required>
          <label for="delivery-soon">Как можно скорее</label>
        </div>
        <div class="radio-row">
          <input id="delivery-exact" type="radio" name="delivery_time_type" value="exact_time" required>
          <label for="delivery-exact">К указанному времени</label>
        </div>

        <label for="delivery-time">Укажите время доставки</label>
        <input id="delivery-time" type="time" name="delivery_time" min="07:00" max="23:00" step="300">
        <p class="form-hint">Доступное время доставки с 7:00 до 23:00</p>

        <div class="form-buttons">
          <button type="reset">Сбросить</button>
          <button type="submit">Отправить</button>
        </div>
      </div>
    </form>
  </section>

  <footer id="contacts" class="footer">
    <p>Позвонить нам <a href="tel:+70000000000">+7-000-000-00-00</a></p>
  </footer>

  <script src="dishes.js"></script>
  <script src="script.js"></script>
</body>
</html>
